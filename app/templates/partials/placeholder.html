<div class="rounded-lg border border-slate-200 bg-white p-3">
  <div class="text-sm font-semibold text-slate-900">{{ title }}</div>
  <div class="mt-1 text-sm text-slate-600">{{ details }}</div>

  <div class="mt-3 rounded-md bg-slate-50 p-3 text-xs text-slate-700">
    <div class="font-medium text-slate-800">Received</div>
    <pre class="mt-2 whitespace-pre-wrap">{{ payload | tojson(indent=2) }}</pre>
  </div>
</div>
