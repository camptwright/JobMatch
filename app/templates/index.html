{% extends "base.html" %}

{% block title %}JobMatch{% endblock %}

{% block content %}
  <div class="mb-6">
    <h1 class="text-2xl font-semibold">Match jobs and resumes</h1>
    <p class="mt-2 text-slate-600">
      Paste text or upload a PDF
    </p>
  </div>

  <div class="grid gap-6 md:grid-cols-2">
    <section class="rounded-xl border bg-white p-5 shadow-sm">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-lg font-semibold">Search with Resume</h2>
          <p class="mt-1 text-sm text-slate-600">Find jobs that best match a resume.</p>
        </div>
      </div>

      <form
        class="mt-4 space-y-3"
        method="post"
        action="/match/jobs"
        enctype="multipart/form-data"
      >
        <label class="block">
          <div class="text-sm font-medium">Paste resume text</div>
          <textarea
            name="text"
            class="mt-1 w-full rounded-lg border border-slate-300 bg-white p-3 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"
            rows="7"
            placeholder="Skills, experience, summary..."
          ></textarea>
        </label>

        <label class="block">
          <div class="text-sm font-medium">Or upload PDF</div>
          <input
            type="file"
            name="pdf"
            accept="application/pdf"
            class="mt-1 block w-full text-sm text-slate-700 file:mr-4 file:rounded-lg file:border-0 file:bg-slate-900 file:px-3 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-slate-800"
          />
        </label>

        <button
          type="submit"
          class="inline-flex items-center justify-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800"
        >
          Find matching jobs
        </button>
      </form>
    </section>

    <section class="rounded-xl border bg-white p-5 shadow-sm">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-lg font-semibold">Search with Job</h2>
          <p class="mt-1 text-sm text-slate-600">Find resumes that best match a job description.</p>
        </div>
      </div>

      <form
        class="mt-4 space-y-3"
        method="post"
        action="/match/resumes"
        enctype="multipart/form-data"
      >
        <label class="block">
          <div class="text-sm font-medium">Paste job description</div>
          <textarea
            name="text"
            class="mt-1 w-full rounded-lg border border-slate-300 bg-white p-3 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"
            rows="7"
            placeholder="Title, responsibilities, required skills..."
          ></textarea>
        </label>

        <label class="block">
          <div class="text-sm font-medium">Or upload PDF</div>
          <input
            type="file"
            name="pdf"
            accept="application/pdf"
            class="mt-1 block w-full text-sm text-slate-700 file:mr-4 file:rounded-lg file:border-0 file:bg-slate-900 file:px-3 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-slate-800"
          />
        </label>

        <button
          type="submit"
          class="inline-flex items-center justify-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800"
        >
          Find matching resumes
        </button>
      </form>
    </section>
  </div>
{% endblock %}
